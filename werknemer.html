<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mijn Planning</title>
<style>
:root{color-scheme:light;}*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b;}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;padding:8px 14px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-p{background:#2563eb;color:#fff;}
.btn-s{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0;}
.btn-sm{padding:5px 10px;font-size:12px;}
.inp{border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit;background:#fff;width:100%;}
.inp:focus{border-color:#3b82f6;box-shadow:0 0 0 3px #bfdbfe55;}
#toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
.center-box{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:#fff;border-radius:16px;padding:24px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.hdr{background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.day-card{background:#fff;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:999;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:20px 20px 32px;}
.month-nav{background:#fff;padding:11px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.05);}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
const COLORS=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#6366F1','#84CC16','#EC4899','#14B8A6','#A855F7','#0EA5E9','#22C55E','#FB923C'];
const MONTHS=['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const DNMS=['Zo','Ma','Di','Wo','Do','Vr','Za'];
const now=new Date();
const TSTR=fd(now.getFullYear(),now.getMonth(),now.getDate());
const LS_SYNC='cap_plan_sync_v2';
const LS_DATA='cap_plan_data_v2';
const LS_AUTH='cap_plan_auth_v1';
const LS_ANON='cap_plan_anon_v1'; // Persistente anonieme Firebase-gebruiker

let SYNC={dbUrl:'',webApiKey:'',enabled:false};
let _authToken=null,_tokenExpiry=0;
let _fbRefreshToken=null,_fbEmail='';

function loadFbAuth(){try{const r=localStorage.getItem(LS_ANON);if(r){const p=JSON.parse(r);_fbRefreshToken=p.refreshToken||null;_fbEmail=p.email||'';}}catch(e){}}
function saveFbAuth(){try{localStorage.setItem(LS_ANON,JSON.stringify({refreshToken:_fbRefreshToken,email:_fbEmail}));}catch(e){}}
function clearFbAuth(){_fbRefreshToken=null;_fbEmail='';_authToken=null;_tokenExpiry=0;try{localStorage.removeItem(LS_ANON);}catch(e){}}
let DATA={persons:[],wns:[],asgn:{},leave:{},actual:{},requests:{},leaveNotes:{}};
let AUTH={pid:null};
let ST={screen:'loading',yr:now.getFullYear(),mo:now.getMonth(),detail:null,loginPid:null,loginErr:'',fbLoginErr:'',requestModal:null,reqTab:'nieuw'};

function fd(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function gwn(id){return DATA.wns.find(w=>w.id===id);}
function gp(id){return DATA.persons.find(p=>p.id===id);}
function pWorks(p,y,m,d){const dow=new Date(y,m,d).getDay();return(p.wd||[1,2,3,4,5]).includes(dow);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,dur=2500){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ── Wachtwoord hashing (PBKDF2 — zelfde als capaciteitsplanning.html) ──
async function hashPassword(pwd){
  if(!pwd)return'';
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(pwd),{name:'PBKDF2'},false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode('cap-planning-salt-v1'),iterations:100000,hash:'SHA-256'},key,256);
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isHashed(s){return typeof s==='string'&&/^[0-9a-f]{64}$/.test(s);}
async function checkPwd(input,stored){
  if(!stored)return true;
  if(isHashed(stored))return(await hashPassword(input))===stored;
  return input===stored; // legacy: oud plaintext wachtwoord — werkt nog tot admin het reset
}

function saveAuth(){try{localStorage.setItem(LS_AUTH,JSON.stringify(AUTH));}catch(e){}}
function loadAuth(){try{const r=localStorage.getItem(LS_AUTH);if(r)AUTH={...AUTH,...JSON.parse(r)};}catch(e){}}
function saveSyncConfig(){try{localStorage.setItem(LS_SYNC,JSON.stringify({dbUrl:SYNC.dbUrl,webApiKey:SYNC.webApiKey,enabled:SYNC.enabled}));}catch(e){}}
function loadSyncConfig(){try{const r=localStorage.getItem(LS_SYNC);if(r){const p=JSON.parse(r);if(p.dbUrl)SYNC={dbUrl:p.dbUrl,webApiKey:p.webApiKey||'',enabled:!!p.enabled};}}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem(LS_DATA);if(r){applyData(JSON.parse(r));return true;}return false;}catch(e){return false;}}
function applyData(d){
  if(d.persons)DATA.persons=d.persons.map(p=>({...p,wd:p.wd||[1,2,3,4,5],pwd:p.pwd||''}));
  if(d.wns)DATA.wns=d.wns.map(w=>({...w,desc:w.desc||'',imgs:w.imgs||[],pdfUrls:w.pdfUrls||[]}));
  if(d.asgn)DATA.asgn=d.asgn;
  if(d.leave)DATA.leave=d.leave; else if(!DATA.leave)DATA.leave={};
  if(d.actual)DATA.actual=d.actual; else if(!DATA.actual)DATA.actual={};
  if(d.requests)DATA.requests=d.requests; else if(!DATA.requests)DATA.requests={};
  if(d.leaveNotes)DATA.leaveNotes=d.leaveNotes; else if(!DATA.leaveNotes)DATA.leaveNotes={};
}
function fbBase(path){return SYNC.dbUrl.replace(/\/$/,'')+'/planning/'+(path||'')+'.json';}
function fbActualBase(){return fbBase('actual');}
function fbRequestBase(){return fbBase('requests');}
// Paden die werknemers mogen lezen (geen auditlog, geen root)
const WORKER_PATHS=['persons','wns','asgn','leave','leaveNotes','actual','requests'];

async function getAuthToken(){
  if(_authToken&&Date.now()<_tokenExpiry)return _authToken;
  if(!SYNC.webApiKey)return null;
  // Probeer bestaande sessie te vernieuwen
  if(_fbRefreshToken){
    try{
      const r=await fetch(`https://securetoken.googleapis.com/v1/token?key=${SYNC.webApiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({grant_type:'refresh_token',refresh_token:_fbRefreshToken})});
      if(r.ok){
        const d=await r.json();
        _authToken=d.id_token;
        _fbRefreshToken=d.refresh_token;
        _tokenExpiry=Date.now()+(parseInt(d.expires_in||3600)-120)*1000;
        saveFbAuth();
        return _authToken;
      }
      // Sessie verlopen — terug naar Firebase login
      clearFbAuth();
      ST.screen='firebase-login';render();return null;
    }catch(e){}
  }
  // Geen sessie — toon Firebase login
  ST.screen='firebase-login';render();
  return null;
}

async function doFirebaseLogin(){
  const email=document.getElementById('fb-email')?.value?.trim();
  const pwd=document.getElementById('fb-pwd')?.value||'';
  if(!email||!pwd){ST.fbLoginErr='Vul je e-mail en wachtwoord in.';render();return;}
  try{
    const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${SYNC.webApiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd,returnSecureToken:true})});
    const d=await r.json();
    if(!r.ok){
      const msgs={'EMAIL_NOT_FOUND':'E-mailadres niet gevonden.','INVALID_PASSWORD':'Onjuist wachtwoord.','USER_DISABLED':'Account is geblokkeerd.','INVALID_LOGIN_CREDENTIALS':'Onjuiste inloggegevens.','TOO_MANY_ATTEMPTS_TRY_LATER':'Te veel pogingen — probeer later opnieuw.'};
      ST.fbLoginErr=msgs[d.error?.message]||d.error?.message||'Inloggen mislukt';
      render();return;
    }
    _authToken=d.idToken;
    _fbRefreshToken=d.refreshToken;
    _fbEmail=email;
    _tokenExpiry=Date.now()+(parseInt(d.expiresIn||3600)-120)*1000;
    saveFbAuth();
    ST.fbLoginErr='';
    showToast('🔄 Gegevens ophalen...',3000);
    const ok=await pullFromFirebase();
    if(!ok){showToast('⚠️ Gegevens ophalen mislukt');ST.screen='firebase-login';render();return;}
    startRealtimeSync();
    if(AUTH.pid&&gp(AUTH.pid))ST.screen='planning';
    else ST.screen='login';
    render();
  }catch(e){ST.fbLoginErr='Verbinding mislukt.';render();}
}

function fbSignOut(){
  clearFbAuth();
  AUTH={pid:null};saveAuth();
  ST.screen='firebase-login';ST.fbLoginErr='';
  render();showToast('👋 Uitgelogd');
}

async function pullFromFirebase(){
  if(!SYNC.enabled||!SYNC.dbUrl)return false;
  try{
    const t=await getAuthToken();
    const auth=t?'?auth='+t:'';
    // Haal elk pad afzonderlijk op — werknemer heeft geen leestoegang op /planning root
    const results=await Promise.all(WORKER_PATHS.map(p=>
      fetch(fbBase(p)+auth).then(r=>r.ok?r.json():null).catch(()=>null)
    ));
    const d={};
    WORKER_PATHS.forEach((p,i)=>{if(results[i]!==null&&results[i]!==undefined)d[p]=results[i];});
    if(d.persons){
      applyData(d);
      try{localStorage.setItem(LS_DATA,JSON.stringify(d));}catch(e){}
      return true;
    }
    return false;
  }catch(e){return false;}
}

let esConn=null;
async function startRealtimeSync(){
  if(esConn){esConn.close();esConn=null;}
  if(!SYNC.enabled||!SYNC.dbUrl)return;
  const token=await getAuthToken();
  // Luister op /planning/asgn — werknemer heeft hier leestoegang, niet op de root
  const url=fbBase('asgn')+(token?'?auth='+token:'');
  let firstEvent=true;
  try{
    esConn=new EventSource(url);
    esConn.addEventListener('put',e=>{
      try{
        if(firstEvent){firstEvent=false;return;}
        // Haal bij elke wijziging alle toegestane paden opnieuw op
        const oldRequests=JSON.parse(JSON.stringify(DATA.requests||{}));
        pullFromFirebase().then(ok=>{
          if(!ok)return;
          const pid=AUTH.pid;
          let toastMsg='🔄 Planning bijgewerkt';
          if(pid){
            const newReqs=DATA.requests||{};
            for(const id of Object.keys(newReqs)){
              const nr=newReqs[id];const or=oldRequests[id];
              if(nr&&nr.pid===pid&&or&&or.status!==nr.status){
                if(nr.status==='approved')toastMsg='✅ Verlofaanvraag goedgekeurd!';
                else if(nr.status==='rejected')toastMsg='❌ Verlofaanvraag afgewezen';
              }
            }
          }
          render();showToast(toastMsg,3000);
        });
      }catch(err){}
    });
    const refreshIn=Math.max(30000,_tokenExpiry-Date.now()-60000);
    setTimeout(()=>{if(SYNC.enabled)startRealtimeSync();},refreshIn);
  }catch(e){}
}

function render(){document.getElementById('app').innerHTML=buildApp();}

function buildApp(){
  if(ST.screen==='loading')return`<div class="center-box"><div style="text-align:center;"><div style="font-size:44px;margin-bottom:14px;">⏳</div><div style="color:#64748b;font-size:14px;">Even laden...</div></div></div>`;
  if(ST.screen==='setup')return buildSetup();
  if(ST.screen==='firebase-login')return buildFirebaseLogin();
  if(ST.screen==='login')return buildLogin();
  return buildPlanning()+(ST.requestModal?buildRequestModal():'');
}

function buildFirebaseLogin(){
  return`<div class="center-box"><div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:52px;margin-bottom:10px;">🔑</div>
      <h1 style="font-size:22px;font-weight:700;">Inloggen</h1>
      <p style="font-size:13px;color:#64748b;margin-top:8px;line-height:1.5;">Log in met je bedrijfsaccount<br><span style="font-size:11px;opacity:.7;">bijv. naam@weldingsupport.nl</span></p>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">E-mailadres</label>
        <input id="fb-email" class="inp" type="email" placeholder="naam@weldingsupport.nl" value="${esc(_fbEmail)}" autocomplete="email">
      </div>
      <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">Wachtwoord</label>
        <input id="fb-pwd" class="inp" type="password" placeholder="Wachtwoord" autocomplete="current-password" onkeydown="if(event.key==='Enter')doFirebaseLogin()">
      </div>
      ${ST.fbLoginErr?`<div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 12px;font-size:13px;">${esc(ST.fbLoginErr)}</div>`:''}
      <button class="btn btn-p" style="width:100%;padding:12px;font-size:14px;" onclick="doFirebaseLogin()">Inloggen →</button>
      <button class="btn btn-s btn-sm" style="width:100%;color:#94a3b8;font-size:11px;" onclick="resetSetup()">⚙️ Verbinding wijzigen</button>
    </div>
  </div></div>`;
}

function buildSetup(){
  return`<div class="center-box"><div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:52px;margin-bottom:10px;">📋</div>
      <h1 style="font-size:22px;font-weight:700;">Mijn Planning</h1>
      <p style="font-size:13px;color:#64748b;margin-top:8px;line-height:1.5;">Voer de synchronisatiegegevens in.<br>Je krijgt deze van je planner.</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">Database URL</label><input id="s-url" class="inp" placeholder="https://project-default-rtdb.firebaseio.com"></div>
      <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">Web API-sleutel</label><input id="s-key" class="inp" placeholder="AIzaSy..." type="password"></div>
      <button class="btn btn-p" style="width:100%;padding:12px;font-size:14px;" onclick="saveSetup()">Verbinden →</button>
    </div>
  </div></div>`;
}

function buildLogin(){
  return`<div class="center-box"><div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:52px;margin-bottom:10px;">👷</div>
      <h1 style="font-size:22px;font-weight:700;">Inloggen</h1>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">Wie ben jij?</label>
        <select id="l-pid" class="inp" onchange="ST.loginPid=parseInt(this.value)||null">
          <option value="">— Kies je naam —</option>
          ${DATA.persons.map(p=>`<option value="${p.id}" ${ST.loginPid===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">Wachtwoord</label>
        <input id="l-pwd" class="inp" type="password" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      ${ST.loginErr?`<div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 12px;font-size:13px;">${esc(ST.loginErr)}</div>`:''}
      <button class="btn btn-p" style="width:100%;padding:12px;font-size:14px;" onclick="doLogin()">Inloggen</button>
      <button class="btn btn-s btn-sm" style="width:100%;" onclick="refreshAndShow()">🔄 Data vernieuwen</button>
      <button class="btn btn-s btn-sm" style="width:100%;color:#94a3b8;font-size:11px;" onclick="resetSetup()">⚙️ Verbinding wijzigen</button>
    </div>
  </div></div>`;
}

function buildPlanning(){
  const p=gp(AUTH.pid);
  if(!p){logout();return buildLogin();}
  const days=dim(ST.yr,ST.mo);
  const arr=Array.from({length:days},(_,i)=>i+1);
  const isThisMonth=ST.yr===now.getFullYear()&&ST.mo===now.getMonth();
  const todayWid=isThisMonth?DATA.asgn[`${p.id}_${TSTR}`]:undefined;
  const todayWn=todayWid?gwn(todayWid):null;

  const myRequests=Object.values(DATA.requests||{}).filter(r=>r.pid===p.id);
  const pendingN=myRequests.filter(r=>r.status==='pending').length;

  return`<div>
    <div class="hdr">
      <div>
        <div style="font-size:17px;font-weight:700;">📋 Mijn Planning</div>
        <div style="font-size:12px;opacity:.8;margin-top:2px;">${esc(p.name)}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button style="position:relative;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;font-weight:500;" onclick="openRequestModal()">
          📋 Verlof
          ${pendingN?`<span style="position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;">${pendingN}</span>`:''}
        </button>
        <button style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;" onclick="refreshAndShow()" title="Vernieuwen">🔄</button>
        <button style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:500;" onclick="fbSignOut()">Uitloggen</button>
      </div>
    </div>

    ${isThisMonth?`<div style="background:linear-gradient(to right,#eff6ff,#f0fdf4);padding:14px 16px;border-bottom:1px solid #e2e8f0;">
      <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:.06em;margin-bottom:8px;">VANDAAG — ${new Date().toLocaleDateString('nl',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()}</div>
      ${todayWn?`<div class="day-card" style="border-left:4px solid ${todayWn.color};cursor:pointer;" onclick="openDetail(${todayWn.id},'${TSTR}')">
        <div style="flex:1;">
          <div style="font-weight:700;font-size:15px;color:${todayWn.color};">${esc(todayWn.label)}</div>
          <div style="font-size:12px;color:#64748b;margin-top:3px;">${todayWn.desc?esc(todayWn.desc.substring(0,70))+(todayWn.desc.length>70?'...':''):'Tik voor details →'}</div>
        </div>
        <div style="font-size:20px;color:#94a3b8;">›</div>
      </div>`:`<div style="font-size:13px;color:#94a3b8;padding:2px 0;">${pWorks(p,now.getFullYear(),now.getMonth(),now.getDate())?'Geen werkorder toegewezen voor vandaag':'Vandaag is een vrije dag'}</div>`}
    </div>`:''}

    <div class="month-nav">
      <button class="btn btn-s btn-sm" onclick="prevMo()">◀</button>
      <span style="font-size:15px;font-weight:700;flex:1;text-align:center;">${MONTHS[ST.mo]} ${ST.yr}</span>
      <button class="btn btn-s btn-sm" onclick="nextMo()">▶</button>
      <button class="btn btn-s btn-sm" onclick="goToday()">Nu</button>
    </div>

    <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px;padding-bottom:24px;">
      ${arr.map(d=>{
        const ds=fd(ST.yr,ST.mo,d);
        const works=pWorks(p,ST.yr,ST.mo,d);
        const wid=works?DATA.asgn[`${p.id}_${ds}`]:undefined;
        const wn=wid?gwn(wid):null;
        const isToday=ds===TSTR;
        const dow=new Date(ST.yr,ST.mo,d).getDay();
        const isWknd=dow===0||dow===6;
        const actHrs=(DATA.actual||{})[`${p.id}_${ds}`];
        const leaveVal=(DATA.leave||{})[`${p.id}_${ds}`];
        const leaveEmoji=leaveVal==='V'?'🌴':leaveVal==='Z'?'🤒':leaveVal==='G'?'⏰':leaveVal==='B'?'🎗️':'';
        const leaveLabel=leaveVal==='V'?'Verlof':leaveVal==='Z'?'Ziek':leaveVal==='G'?'Gedeeltelijk verlof':leaveVal==='B'?'Bijzonder verlof':'';
        const leaveBg=leaveVal==='V'?'#dcfce7':leaveVal==='Z'?'#fee2e2':leaveVal==='G'?'#e0f2fe':leaveVal==='B'?'#fce7f3':'';
        const leaveCol=leaveVal==='V'?'#15803d':leaveVal==='Z'?'#dc2626':leaveVal==='G'?'#0369a1':leaveVal==='B'?'#9d174d':'';
        const pendingReq=myRequests.find(r=>r.status==='pending'&&(r.ds===ds||r.fromDs<=ds&&ds<=r.toDs));
        const borderCol=isToday?'#3b82f6':leaveVal?leaveCol:wn?wn.color:works?'#e2e8f0':'#f1f5f9';
        const clickable=wn||leaveVal;

async function submitActual(ds,hrs){
  const pid=AUTH.pid;if(!pid)return;
  const key=`${pid}_${ds}`;
  if(!DATA.actual)DATA.actual={};
  if(hrs===null||hrs===''||isNaN(hrs)){
    delete DATA.actual[key];
  }else{
    DATA.actual[key]=Math.max(0,parseFloat(hrs)||0);
  }
  // Persist locally
  try{const raw=localStorage.getItem(LS_DATA);if(raw){const d=JSON.parse(raw);d.actual=DATA.actual;localStorage.setItem(LS_DATA,JSON.stringify(d));}}catch(e){}
  // PATCH to Firebase
  if(SYNC.enabled&&SYNC.dbUrl){
    try{
      const t=await getAuthToken();
      const url=fbActualBase()+(t?'?auth='+t:'');
      const patch={};
      patch[key]=DATA.actual[key]!==undefined?DATA.actual[key]:null;
      await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
    }catch(e){showToast('⚠️ Opslaan mislukt — lokaal bewaard');return;}
  }
  showToast(DATA.actual[key]!==undefined?`⏱ ${DATA.actual[key]}u opgeslagen`:'⏱ Uren verwijderd');
  render();
}

async function submitRequest(){
  const p=gp(AUTH.pid);if(!p)return;
  const rm=ST.requestModal;
  // Validate
  if(rm.type==='verlof'){if(!rm.fromDs||!rm.toDs){showToast('⚠️ Vul de datums in');return;}if(rm.fromDs>rm.toDs){showToast('⚠️ Einddatum moet na begindatum liggen');return;}}
  if(rm.type==='gedeeltelijk'){if(!rm.ds){showToast('⚠️ Kies een datum');return;}if(!rm.hours||isNaN(rm.hours)||parseFloat(rm.hours)<=0){showToast('⚠️ Vul het aantal uren in');return;}}
  if(rm.type==='bijzonder'&&!rm.ds){showToast('⚠️ Kies een datum');return;}
  const id='req_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const req={id,pid:p.id,pName:p.name,type:rm.type,status:'pending',submittedAt:Date.now(),note:rm.note||''};
  if(rm.type==='verlof'){req.fromDs=rm.fromDs;req.toDs=rm.toDs;}
  else if(rm.type==='gedeeltelijk'){req.ds=rm.ds;req.fromTime=rm.fromTime||'';req.hours=parseFloat(rm.hours);}
  else if(rm.type==='bijzonder'){req.ds=rm.ds;req.category=rm.category||'overig';}
  if(!DATA.requests)DATA.requests={};
  DATA.requests[id]=req;
  // Persist locally
  try{const raw=localStorage.getItem(LS_DATA);if(raw){const d=JSON.parse(raw);d.requests=DATA.requests;localStorage.setItem(LS_DATA,JSON.stringify(d));}}catch(e){}
  // PATCH to Firebase
  if(SYNC.enabled&&SYNC.dbUrl){
    try{
      const t=await getAuthToken();
      const url=fbRequestBase()+(t?'?auth='+t:'');
      const patch={};patch[id]=req;
      const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
      if(!r.ok){showToast('⚠️ Opslaan mislukt');return;}
    }catch(e){showToast('⚠️ Verbinding mislukt — lokaal bewaard');return;}
  }
  showToast('✅ Aanvraag ingediend!');
  ST.reqTab='mijn';
  render();
}

async function cancelRequest(id){
  if(!confirm('Aanvraag intrekken?'))return;
  const req=(DATA.requests||{})[id];if(!req)return;
  req.status='cancelled';req.cancelledAt=Date.now();
  // Persist locally
  try{const raw=localStorage.getItem(LS_DATA);if(raw){const d=JSON.parse(raw);d.requests=DATA.requests;localStorage.setItem(LS_DATA,JSON.stringify(d));}}catch(e){}
  // PATCH to Firebase
  if(SYNC.enabled&&SYNC.dbUrl){
    try{
      const t=await getAuthToken();
      const url=fbRequestBase()+(t?'?auth='+t:'');
      const patch={};patch[id]=req;
      await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
    }catch(e){showToast('⚠️ Verbinding mislukt');}
  }
  showToast('🚫 Aanvraag ingetrokken');
  render();
}

async function doLogin(){
  const pid=parseInt(document.getElementById('l-pid')?.value)||null;

  if(!pid){ST.loginErr='Kies je naam.';render();return;}

  AUTH={pid};saveAuth();ST.loginErr='';ST.loginPid=null;ST.screen='planning';render();showToast(`👋 Welkom, ${p.name}!`);
}

  ST.screen='loading';render();
  if(_fbRefreshToken){
    // Bekende sessie — probeer token te vernieuwen en data op te halen
    getAuthToken().then(token=>{
      if(!token)return; // getAuthToken zet screen al op firebase-login
      pullFromFirebase().then(ok=>{
        if(!ok)showToast('⚠️ Offline — lokale data wordt getoond');
        if(AUTH.pid&&gp(AUTH.pid))ST.screen='planning';
        else{AUTH={pid:null};saveAuth();ST.screen='login';}
        startRealtimeSync();render();
      });
    });
  }else{
    // Geen bekende sessie — toon Firebase login
    ST.screen='firebase-login';render();
  }
}else{
  ST.screen='setup';render();
}
</script>
</body>
</html>
