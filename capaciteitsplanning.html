<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Capaciteitsplanning</title>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b;}
.hdr{background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.25);gap:12px;flex-wrap:wrap;}
.hdr h1{font-size:18px;font-weight:700;}
.hdr-sub{font-size:12px;opacity:.75;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(255,255,255,.15);cursor:default;}
.sync-dot{width:8px;height:8px;border-radius:50%;}
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;padding:0 16px;overflow-x:auto;}
.tab{padding:11px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;}
.tab:hover:not(.active){color:#334155;}
.content{padding:16px;max-width:1600px;}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.gw{overflow-x:auto;}
.pg{border-collapse:collapse;width:max-content;}
.pg th,.pg td{border:1px solid #e2e8f0;}
.pg thead th{background:#f8fafc;font-size:11px;padding:3px 2px;text-align:center;font-weight:600;}
.nc{position:sticky;left:0;background:#fff;z-index:5;min-width:130px;max-width:130px;padding:5px 10px;border-right:2px solid #e2e8f0!important;}
.nh{position:sticky;left:0;background:#f8fafc;z-index:6;min-width:130px;max-width:130px;padding:5px 10px;text-align:left!important;border-right:2px solid #e2e8f0!important;}
.dc{width:40px;min-width:40px;max-width:40px;height:56px;cursor:pointer;position:relative;padding:0;vertical-align:middle;transition:background .1s;}
.dc:hover{background:rgba(0,0,0,.04);}
.dc.off{background:#f8fafc!important;cursor:default;border-color:#f1f5f9!important;}
.dh{width:40px;min-width:40px;}
.dh.wknd{color:#94a3b8;}
.dh.td-col{background:#dbeafe;}
.ptrack{background:#e2e8f0;border-radius:999px;height:14px;overflow:hidden;}
.pfill{height:100%;border-radius:999px;transition:width .4s;}
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:16px;padding:22px;min-width:290px;max-width:480px;width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.28);max-height:90vh;overflow-y:auto;}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;padding:8px 14px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-p{background:#2563eb;color:#fff;}
.btn-s{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0;}
.btn-d{background:#fee2e2;color:#dc2626;}
.btn-g{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-gst{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);}
.inp{border:1px solid #d1d5db;border-radius:8px;padding:7px 11px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
.inp:focus{border-color:#3b82f6;box-shadow:0 0 0 3px #bfdbfe55;}
.inp-sm{border:1px solid #e2e8f0;border-radius:6px;padding:3px 7px;font-size:12px;outline:none;font-family:inherit;}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.sgrid{grid-template-columns:1fr;}}
.brow td{height:28px;border-top:2px solid #e2e8f0;background:#f8fafc;}
.bnc{background:#f8fafc!important;font-size:11px;font-weight:600;color:#475569;}
.wnbtn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;text-align:left;width:100%;transition:all .15s;}
.dot{display:inline-block;border-radius:50%;flex-shrink:0;}
.smgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.smcard{border-radius:10px;padding:14px;text-align:center;}
.smnum{font-size:30px;font-weight:700;}
.smlbl{font-size:11px;margin-top:3px;}
textarea.jtxt{width:100%;height:160px;border:1px solid #d1d5db;border-radius:8px;padding:10px;font-family:monospace;font-size:12px;resize:vertical;}
.pitem{background:#f8fafc;border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.prow1{display:flex;align-items:center;gap:7px;}
.prow2{display:flex;align-items:center;gap:5px;margin-top:8px;flex-wrap:wrap;}
.wd-btn{border:1px solid #cbd5e1;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;cursor:pointer;background:#fff;color:#64748b;transition:all .15s;line-height:1.4;}
.wd-btn.on{background:#2563eb;color:#fff;border-color:#2563eb;}
.wd-btn:hover{opacity:.8;}
#toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#1e3a8a;line-height:1.6;}
.info-box ol{margin:8px 0 0 18px;}
.info-box ol li{margin-bottom:4px;}
.info-box a{color:#2563eb;}
.dc.drag-over{outline:2px solid #3b82f6;background:#eff6ff!important;transition:none;}
.dc.range-sel{outline:2px solid #6366f1;outline-offset:-1px;background:#eef2ff!important;}
.dc.verlof{background:repeating-linear-gradient(135deg,#fef3c7,#fef3c7 3px,#fffbeb 3px,#fffbeb 9px)!important;}
.dc.ziek{background:repeating-linear-gradient(135deg,#fee2e2,#fee2e2 3px,#fff1f2 3px,#fff1f2 9px)!important;}
.wnbadge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:grab;user-select:none;transition:opacity .15s;}
.wnbadge:hover{opacity:.85;}
.wnbadge:active{cursor:grabbing;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
const COLORS=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#6366F1','#84CC16','#EC4899','#14B8A6','#A855F7','#0EA5E9','#22C55E','#FB923C'];
const MONTHS=['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const DNMS=['Zo','Ma','Di','Wo','Do','Vr','Za'];
const DOW_ORDER=[1,2,3,4,5,6,0];
const now=new Date();
const TSTR=fd(now.getFullYear(),now.getMonth(),now.getDate());
function getViewMonday(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return fd(dt.getFullYear(),dt.getMonth(),dt.getDate());}
function parseDs(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt;}
function fdDate(d){return fd(d.getFullYear(),d.getMonth(),d.getDate());}
function getWeekNr(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);}
const LS_DATA='cap_plan_data_v2';
const LS_SYNC='cap_plan_sync_v2';

let S={
  tab:'planning',yr:now.getFullYear(),mo:now.getMonth(),
  persons:[
    {id:1,name:'Persoon 1',hrs:8,wd:[1,2,3,4,5],pwd:''},
    {id:2,name:'Persoon 2',hrs:8,wd:[1,2,3,4,5],pwd:''},
    {id:3,name:'Persoon 3',hrs:8,wd:[1,2,3,4,5],pwd:''},
  ],
  wns:[
    {id:1,label:'WN-001',needed:80,color:COLORS[0],desc:'',imgs:[],pdfUrls:[]},
    {id:2,label:'WN-002',needed:40,color:COLORS[1],desc:'',imgs:[],pdfUrls:[]},
  ],
  asgn:{},leave:{},modal:null,dataModal:null,wnEditModal:null,rangeModal:null,npid:4,nwid:3,viewStart:getViewMonday(now)
};

let SYNC={dbUrl:'',webApiKey:'',cloudName:'',uploadPreset:'',enabled:false};
let syncStatus='off';
let lastSyncTime=null;
let pushTimer=null;
let esConn=null;
let justPushed=false;
let dragData=null;
let rangeState=null;
let _authToken=null;
let _tokenExpiry=0;

function fd(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function dn(y,m,d){return DNMS[new Date(y,m,d).getDay()];}
function iswk(y,m,d){const n=new Date(y,m,d).getDay();return n===0||n===6;}
function gwn(id){return S.wns.find(w=>w.id===id);}
function gp(id){return S.persons.find(p=>p.id===id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dot(c,sz=10){return`<span class="dot" style="width:${sz}px;height:${sz}px;background:${c}"></span>`;}
function pWorks(p,y,m,d){const dow=new Date(y,m,d).getDay();return(p.wd||[1,2,3,4,5]).includes(dow);}

function cap(){
  return S.wns.map(w=>{
    let pl=0;
    for(const[k,wid] of Object.entries(S.asgn)){
      if(wid!==w.id)continue;
      const pid=parseInt(k.split('_')[0]);
      const p=gp(pid);
      if(p)pl+=p.hrs;
    }
    const pct=w.needed>0?Math.min(100,Math.round(pl/w.needed*100)):0;
    return{...w,pl,pct};
  });
}

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function saveLocal(){
  try{localStorage.setItem(LS_DATA,JSON.stringify({persons:S.persons,wns:S.wns,asgn:S.asgn,leave:S.leave||{},npid:S.npid,nwid:S.nwid,updatedAt:Date.now()}));}catch(e){}
}
function loadLocal(){
  try{const raw=localStorage.getItem(LS_DATA);if(!raw)return false;applyData(JSON.parse(raw));return true;}catch(e){return false;}
}
function saveSyncConfig(){try{localStorage.setItem(LS_SYNC,JSON.stringify({dbUrl:SYNC.dbUrl,webApiKey:SYNC.webApiKey,cloudName:SYNC.cloudName||'',uploadPreset:SYNC.uploadPreset||'',enabled:SYNC.enabled}));}catch(e){}}
function loadSyncConfig(){try{const raw=localStorage.getItem(LS_SYNC);if(raw){const p=JSON.parse(raw);if(p.dbUrl)SYNC={dbUrl:p.dbUrl,webApiKey:p.webApiKey||'',cloudName:p.cloudName||'',uploadPreset:p.uploadPreset||'',enabled:!!p.enabled};}}catch(e){}}
function applyData(d){
  if(d.persons)S.persons=d.persons.map(p=>({...p,wd:p.wd||[1,2,3,4,5],pwd:p.pwd||''}));
  if(d.wns)S.wns=d.wns.map(w=>({...w,desc:w.desc||'',imgs:w.imgs||[],pdfUrls:w.pdfUrls||[]}));
  if(d.asgn)S.asgn=d.asgn;
  if(d.leave)S.leave=d.leave; else if(!S.leave)S.leave={};
  if(d.npid)S.npid=d.npid;
  if(d.nwid)S.nwid=d.nwid;
  if(S.persons.length)S.npid=Math.max(S.npid,...S.persons.map(p=>p.id+1));
  if(S.wns.length)S.nwid=Math.max(S.nwid,...S.wns.map(w=>w.id+1));
}
function getExportData(){return{persons:S.persons,wns:S.wns,asgn:S.asgn,leave:S.leave||{},npid:S.npid,nwid:S.nwid,updatedAt:Date.now()};}

function fbBase(){return SYNC.dbUrl.replace(/\/$/,'')+'/planning.json';}

async function getAuthToken(){
  if(_authToken&&Date.now()<_tokenExpiry)return _authToken;
  if(!SYNC.webApiKey)return null;
  try{
    const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${SYNC.webApiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({returnSecureToken:true})});
    if(!r.ok)return null;
    const d=await r.json();
    _authToken=d.idToken;
    _tokenExpiry=Date.now()+(parseInt(d.expiresIn||3600)-120)*1000;
    return _authToken;
  }catch(e){return null;}
}

async function authUrl(){const t=await getAuthToken();return fbBase()+(t?'?auth='+t:'');}

// ── Cloudinary opslag ────────────────────────────────────────
function cloudinaryReady(){return !!(SYNC.cloudName&&SYNC.uploadPreset);}
async function uploadToCloudinary(file,resourceType='image'){
  if(!cloudinaryReady())throw new Error('Cloudinary niet geconfigureerd');
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',SYNC.uploadPreset);
  const r=await fetch(
    `https://api.cloudinary.com/v1_1/${SYNC.cloudName}/${resourceType}/upload`,
    {method:'POST',body:fd}
  );
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Status ${r.status}`);}
  const d=await r.json();
  return d.secure_url;
}
async function compressToBlob(file,maxW=1400,quality=0.85){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(maxW/img.width,maxW/img.height,1);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(b=>resolve(b),'image/jpeg',quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function pushToFirebase(silent=false){
  if(!SYNC.enabled||!SYNC.dbUrl)return;
  syncStatus='syncing';updateSyncBadge();
  justPushed=true;setTimeout(()=>{justPushed=false;},6000);
  try{
    const url=await authUrl();
    const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(getExportData())});
    if(r.ok){syncStatus='ok';lastSyncTime=new Date();if(!silent)showToast('☁️ Opgeslagen in Firebase');}
    else{syncStatus='error';showToast('❌ Firebase fout: '+r.status);}
  }catch(e){syncStatus='error';showToast('❌ Verbinding mislukt');}
  updateSyncBadge();
}

async function pullFromFirebase(){
  if(!SYNC.enabled||!SYNC.dbUrl)return false;
  syncStatus='syncing';updateSyncBadge();
  try{
    const url=await authUrl();
    const r=await fetch(url);
    if(!r.ok){syncStatus='error';updateSyncBadge();return false;}
    const d=await r.json();
    if(d&&d.persons){applyData(d);saveLocal();syncStatus='ok';lastSyncTime=new Date();updateSyncBadge();return true;}
    syncStatus='ok';updateSyncBadge();return false;
  }catch(e){syncStatus='error';updateSyncBadge();return false;}
}

function schedulePush(){clearTimeout(pushTimer);pushTimer=setTimeout(()=>pushToFirebase(true),2000);}

async function startRealtimeSync(){
  if(esConn){esConn.close();esConn=null;}
  if(!SYNC.enabled||!SYNC.dbUrl)return;
  const token=await getAuthToken();
  if(!token&&SYNC.webApiKey){syncStatus='error';updateSyncBadge();return;}
  const url=fbBase()+(token?'?auth='+token:'');
  let firstEvent=true;
  try{
    esConn=new EventSource(url);
    esConn.addEventListener('put',e=>{
      try{
        const msg=JSON.parse(e.data);
        if(firstEvent){
          firstEvent=false;
          if(msg.data&&msg.data.persons){applyData(msg.data);saveLocal();syncStatus='ok';lastSyncTime=new Date();updateSyncBadge();render();}
          return;
        }
        if(justPushed)return;
        if(msg.data&&msg.data.persons){applyData(msg.data);saveLocal();syncStatus='ok';lastSyncTime=new Date();updateSyncBadge();render();showToast('🔄 Planning bijgewerkt door collega');}
      }catch(err){}
    });
    esConn.onerror=()=>{syncStatus='error';updateSyncBadge();};
    esConn.onopen=()=>{syncStatus='ok';updateSyncBadge();};
    // Herverbind vóór token verloopt
    const refreshIn=Math.max(30000,_tokenExpiry-Date.now()-60000);
    setTimeout(()=>{if(SYNC.enabled)startRealtimeSync();},refreshIn);
  }catch(e){syncStatus='error';updateSyncBadge();}
}
function updateSyncBadge(){
  const el=document.getElementById('sync-badge');if(!el)return;
  const cfg={off:{col:'#94a3b8',label:'Geen sync'},ok:{col:'#22c55e',label:lastSyncTime?`Sync ${lastSyncTime.toLocaleTimeString('nl',{hour:'2-digit',minute:'2-digit'})}`:'Verbonden'},syncing:{col:'#f59e0b',label:'Synchroniseren...'},error:{col:'#ef4444',label:'Sync mislukt'}}[syncStatus];
  el.innerHTML=`<span class="sync-dot" style="background:${cfg.col}"></span>${cfg.label}`;
}
function onChange(){saveLocal();schedulePush();}

function render(){document.getElementById('app').innerHTML=buildApp();updateSyncBadge();}

function buildApp(){
  const syncDot=syncStatus==='ok'?'#22c55e':syncStatus==='syncing'?'#f59e0b':syncStatus==='error'?'#ef4444':'#94a3b8';
  const syncLbl=syncStatus==='off'?'Geen sync':syncStatus==='syncing'?'Synchroniseren...':syncStatus==='error'?'Sync mislukt':lastSyncTime?`Sync ${lastSyncTime.toLocaleTimeString('nl',{hour:'2-digit',minute:'2-digit'})}`:'Verbonden';
  return`
  <div class="hdr">
    <div><h1>📅 Capaciteitsplanning</h1><div class="hdr-sub">Personen · Werknummers · Capaciteit</div></div>
    <div class="hdr-right">
      <button class="btn btn-gst btn-sm" onclick="manualRefresh()" title="Laatste versie ophalen uit cloud">🔄 Vernieuwen</button>
      <div class="sync-badge" id="sync-badge" onclick="setTab('sync')" style="cursor:pointer;" title="Synchronisatie-instellingen">
        <span class="sync-dot" style="background:${syncDot}"></span>${syncLbl}
      </div>
    </div>
  </div>
  <div class="tabs">
    ${['planning','capaciteit','instellingen','sync'].map(t=>`<button class="tab ${S.tab===t?'active':''}" onclick="setTab('${t}')">${{planning:'📋 Planning',capaciteit:'📊 Capaciteit',instellingen:'⚙️ Instellingen',sync:'☁️ Synchronisatie'}[t]}</button>`).join('')}
  </div>
  <div class="content">
    ${S.tab==='planning'?bPlanning():S.tab==='capaciteit'?bCap():S.tab==='instellingen'?bInst():bSync()}
  </div>
  ${S.modal?bModal():''}
  ${S.dataModal?bDataModal():''}
  ${S.wnEditModal?bWnEditModal():''}
  ${S.rangeModal?bRangeModal():''}`;
}

function bPlanning(){
  const startDate=parseDs(S.viewStart);
  const days=Array.from({length:42},(_,i)=>addDays(startDate,i));
  const endDate=days[41];
  const rangeLabel=`${startDate.toLocaleDateString('nl',{day:'numeric',month:'short'})} – ${endDate.toLocaleDateString('nl',{day:'numeric',month:'short',year:'numeric'})}`;
  // Week groups for header
  const wGroups=Array.from({length:6},(_,w)=>({nr:getWeekNr(days[w*7]),firstDay:days[w*7]}));

  return`<div>
    <div class="card" style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;padding:12px 16px;">
      <button class="btn btn-s btn-sm" onclick="prevWeek()">◀ Week</button>
      <span style="font-size:15px;font-weight:700;min-width:210px;text-align:center;">${rangeLabel}</span>
      <button class="btn btn-s btn-sm" onclick="nextWeek()">Week ▶</button>
      <button class="btn btn-s btn-sm" onclick="goToday()">Vandaag</button>
      <div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:11px;color:#94a3b8;margin-right:2px;">Sleep:</span>
        ${S.wns.map(w=>`<span class="wnbadge" draggable="true" ondragstart="onWnDragStart(${w.id},event)" title="Sleep naar een cel" style="background:${w.color}18;color:${w.color};border:1px solid ${w.color}55;">${dot(w.color,9)}${esc(w.label)}</span>`).join('')}
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;"><div class="gw">
      <table class="pg" style="border-collapse:collapse;"><thead>
        <tr>
          <th class="nh" rowspan="2" style="vertical-align:middle;min-width:130px;">Persoon</th>
          ${wGroups.map(wg=>`<th colspan="7" style="text-align:left;padding:3px 6px;font-size:11px;font-weight:700;color:#475569;background:#f8fafc;border-bottom:2px solid #e2e8f0;white-space:nowrap;">W${wg.nr} <span style="font-weight:400;color:#94a3b8;">${wg.firstDay.toLocaleDateString('nl',{month:'short'})}</span></th>`).join('')}
        </tr>
        <tr>

        ${S.persons.map((p,pi)=>{

          return`<tr style="background:${rowBg};">

            ${days.map((d,di)=>{
              const ds=fdDate(d);
              const wid=S.asgn[`${p.id}_${ds}`];
              const wn=wid!==undefined?gwn(wid):null;
              const works=pWorks(p,d.getFullYear(),d.getMonth(),d.getDate());
              const isToday=ds===TSTR;
              const leaveVal=(S.leave||{})[`${p.id}_${ds}`];
              const leaveClass=leaveVal==='V'?' verlof':leaveVal==='Z'?' ziek':'';
              const leaveIcon=leaveVal?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;pointer-events:none;opacity:.85;">${leaveVal==='V'?'🌴':'🤒'}</div>`:'';
              const dnd=works?`ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="onDrop(${p.id},'${ds}',event);this.classList.remove('drag-over')"${wn?` draggable="true" ondragstart="onCellDragStart(${p.id},'${ds}',event)"`:''}`:'';
              if(!works)return`<td class="dc off"></td>`;
              if(!wn)return`<td class="dc${leaveClass}" data-pid="${p.id}" data-ds="${ds}" style="${isToday?'background:#eff6ff;':''}" onmousedown="cellMouseDown(${p.id},'${ds}',event)" onmouseenter="cellMouseEnter(${p.id},'${ds}')" ${dnd}>${leaveIcon}</td>`;
              // Determine run boundaries
              const prevWid=S.asgn[`${p.id}_${fdDate(addDays(d,-1))}`];
              const nextWid=S.asgn[`${p.id}_${fdDate(addDays(d,1))}`];
              const isStart=prevWid!==wid;
              const isEnd=nextWid!==wid;
              const showLabel=isStart||di===0;
              const l=isStart?'4px':'0';const r=isEnd?'4px':'0';
              const br=isStart&&isEnd?'5px':isStart?'5px 0 0 5px':isEnd?'0 5px 5px 0':'0';
              const bl=isStart?`border-left:3px solid ${wn.color};`:'';
              const br2=isEnd?`border-right:2px solid ${wn.color}55;`:'';
              return`<td class="dc${leaveClass}" data-pid="${p.id}" data-ds="${ds}" onmousedown="cellMouseDown(${p.id},'${ds}',event)" onmouseenter="cellMouseEnter(${p.id},'${ds}')" ${dnd} style="${isToday?'background:#eff6ff;':''}">
                <div style="position:absolute;top:4px;bottom:4px;left:${l};right:${r};background:${wn.color}22;${bl}${br2}border-radius:${br};display:flex;align-items:center;overflow:hidden;padding:0 5px;pointer-events:none;">
                  ${showLabel?`<span style="font-size:9px;font-weight:800;color:${wn.color};white-space:nowrap;letter-spacing:.01em;">${esc(wn.label)}</span>`:''}
                </div>${leaveIcon}
              </td>`;
            }).join('')}
          </tr>`;
        }).join('')}
        <tr class="brow">
          <td class="nc bnc" style="background:#f8fafc;">Bezetting</td>
          ${days.map(d=>{
            const ds=fdDate(d);const dow=d.getDay();
            const workers=S.persons.filter(p=>(p.wd||[1,2,3,4,5]).includes(dow));
            if(!workers.length)return`<td style="background:#f8fafc;border-color:#f1f5f9;"></td>`;
            const cnt=workers.filter(p=>S.asgn[`${p.id}_${ds}`]!==undefined).length;
            if(!cnt)return`<td style="background:#f8fafc;"></td>`;
            const pct=cnt/workers.length;
            const bg=pct>=1?'#dcfce7':pct>=.5?'#fef9c3':'#fee2e2';
            const col=pct>=1?'#15803d':pct>=.5?'#a16207':'#dc2626';
            return`<td style="background:${bg};text-align:center;font-size:9px;font-weight:700;color:${col};vertical-align:middle;">${cnt}/${workers.length}</td>`;
          }).join('')}
        </tr>
        ${!S.persons.length?`<tr><td colspan="43" style="text-align:center;padding:28px;color:#94a3b8;font-size:13px;">Geen personen. Voeg ze toe via ⚙️ Instellingen.</td></tr>`:''}
      </tbody></table>
    </div></div>
    <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#64748b;padding:0 4px;">
      <span><span style="display:inline-block;width:12px;height:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Niet-werkdag</span>
      <span>Bezetting: <span style="color:#15803d;font-weight:600;">groen</span>=vol · <span style="color:#a16207;font-weight:600;">geel</span>=half · <span style="color:#dc2626;font-weight:600;">rood</span>=laag</span>
      <span><span style="font-size:12px;">🌴</span>=Verlof · <span style="font-size:12px;">🤒</span>=Ziek</span>
      <span>💡 Klik of klik+sleep voor toewijzen · Sleep een WN-badge of cel · Klik cel voor verlof</span>
    </div>
  </div>`;
}

function addP(){const n=document.getElementById('pn')?.value?.trim();const h=parseInt(document.getElementById('ph')?.value)||8;if(!n||S.persons.length>=15)return;S.persons.push({id:S.npid++,name:n,hrs:Math.max(1,Math.min(24,h)),wd:[1,2,3,4,5]});onChange();render();}

function toggleWd(pid,dow){const p=gp(pid);if(!p)return;if(!p.wd)p.wd=[1,2,3,4,5];const i=p.wd.indexOf(dow);i===-1?p.wd.push(dow):p.wd.splice(i,1);onChange();render();}
function addW(){const l=document.getElementById('wl')?.value?.trim();const h=parseInt(document.getElementById('wh')?.value)||40;if(!l)return;S.wns.push({id:S.nwid++,label:l,needed:Math.max(1,h),color:COLORS[S.wns.length%COLORS.length],desc:'',imgs:[],pdfUrls:[]});onChange();render();}
function rmW(id){if(!confirm('Werknummer verwijderen?'))return;S.wns=S.wns.filter(w=>w.id!==id);for(const k of Object.keys(S.asgn)){if(S.asgn[k]===id)delete S.asgn[k];}onChange();render();}
function upW(id,f,v){const w=gwn(id);if(w){w[f]=v;onChange();}}
function rstAll(){if(!confirm('Alle planningsdata wissen?'))return;S.asgn={};onChange();pushToCloud(false);render();}

async function connectSync(){
  const dbUrl=document.getElementById('cfg-url')?.value?.trim();
  const webApiKey=document.getElementById('cfg-apikey')?.value?.trim();
  const cloudName=document.getElementById('cfg-cloud')?.value?.trim()||'';
  const uploadPreset=document.getElementById('cfg-preset')?.value?.trim()||'';
  if(!dbUrl||!webApiKey){showToast('⚠️ Vul Database URL en API-sleutel in');return;}
  SYNC={dbUrl,webApiKey,cloudName,uploadPreset,enabled:true};_authToken=null;_tokenExpiry=0;saveSyncConfig();showToast('🔄 Verbinding testen...',4000);
  const ok=await pullFromFirebase();
  if(ok){startRealtimeSync();render();showToast('✅ Verbonden! Data opgehaald uit Firebase.');}
  else{
    await pushToFirebase(false);
    if(syncStatus==='ok'){startRealtimeSync();render();showToast('✅ Verbonden! Data geüpload naar Firebase.');}
    else{SYNC={dbUrl:'',enabled:false};saveSyncConfig();showToast('❌ Verbinding mislukt. Controleer de Database URL en regels.');render();}
  }
}
async function manualPush(){showToast('⬆ Uploaden...',3000);await pushToFirebase(false);if(syncStatus==='ok')showToast('✅ Geüpload naar Firebase');else showToast('❌ Mislukt');render();}
async function manualRefresh(){
  if(!SYNC.enabled){showToast('⚠️ Synchronisatie niet ingesteld');return;}
  showToast('🔄 Ophalen uit Firebase...',3000);
  const changed=await pullFromFirebase();
  if(changed){render();showToast('✅ Planning bijgewerkt');}
  else if(syncStatus==='ok'){showToast('✅ Al up-to-date');}
  else{showToast('❌ Ophalen mislukt');}
  render();
}
function disconnectSync(){if(!confirm('Synchronisatie verwijderen?'))return;if(esConn){esConn.close();esConn=null;}SYNC={dbUrl:'',webApiKey:'',enabled:false};_authToken=null;saveSyncConfig();syncStatus='off';lastSyncTime=null;showToast('Synchronisatie uitgeschakeld');render();}
function doImport(){
  try{const txt=document.getElementById('jtxt2')?.value?.trim();if(!txt)throw new Error('Geen data.');const d=JSON.parse(txt);if(!d.persons||!d.wns||d.asgn===undefined)throw new Error('Ongeldige structuur.');applyData(d);onChange();S.dataModal=null;render();showToast('✅ Back-up geladen');}
  catch(e){const el=document.getElementById('jerr');if(el)el.textContent='Fout: '+e.message;}
}

function openWnEdit(wnId){S.wnEditModal={wnId};render();}
function closeWnEdit(){S.wnEditModal=null;onChange();render();}
function upWnDesc(wnId,val){const w=gwn(wnId);if(w)w.desc=val;}
function addWnPdf(wnId){const w=gwn(wnId);if(!w)return;if(!w.pdfUrls)w.pdfUrls=[];w.pdfUrls.push({id:Date.now(),name:'',url:''});onChange();render();}
function rmWnPdf(wnId,idx){const w=gwn(wnId);if(!w||!w.pdfUrls)return;w.pdfUrls.splice(idx,1);onChange();render();}
function upWnPdfName(wnId,idx,val){const w=gwn(wnId);if(w&&w.pdfUrls[idx])w.pdfUrls[idx].name=val;}
function upWnPdfUrl(wnId,idx,val){const w=gwn(wnId);if(w&&w.pdfUrls[idx])w.pdfUrls[idx].url=val;}
function rmWnImg(wnId,idx){
  const w=gwn(wnId);if(!w||!w.imgs)return;
  // Cloudinary heeft geen client-side delete met unsigned preset — bestand blijft in Cloudinary dashboard
  w.imgs.splice(idx,1);
  onChange();render();
}
async function addWnImg(wnId,input){
  const file=input.files[0];if(!file)return;
  const w=gwn(wnId);if(!w)return;if(!w.imgs)w.imgs=[];
  if(cloudinaryReady()){
    showToast('⏳ Afbeelding uploaden...',8000);
    try{
      const blob=await compressToBlob(file);
      const url=await uploadToCloudinary(blob,'image');
      w.imgs.push({id:Date.now(),name:file.name,url});
      onChange();render();showToast('✅ Afbeelding geüpload');
    }catch(e){showToast('❌ Upload mislukt: '+e.message);}
  }else{
    // Fallback: base64 (geen Cloudinary geconfigureerd)
    showToast('⏳ Afbeelding verwerken...',4000);
    const img=await compressImage(file);
    w.imgs.push(img);onChange();render();showToast('✅ Afbeelding toegevoegd (lokaal)');
  }
}
async function addWnDoc(wnId,input){
  const file=input.files[0];if(!file)return;
  const w=gwn(wnId);if(!w)return;if(!w.pdfUrls)w.pdfUrls=[];
  if(!cloudinaryReady()){showToast('⚠️ Stel eerst Cloudinary in bij ☁️ Synchronisatie');return;}
  showToast('⏳ Document uploaden...',8000);
  try{
    const url=await uploadToCloudinary(file,'raw');
    w.pdfUrls.push({id:Date.now(),name:file.name,url});
    onChange();render();showToast('✅ Document geüpload');
  }catch(e){showToast('❌ Upload mislukt: '+e.message);}
}
async function compressImage(file,maxW=700,quality=0.78){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(maxW/img.width,maxW/img.height,1);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve({id:Date.now(),name:file.name,data:canvas.toDataURL('image/jpeg',quality)});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function onWnDragStart(wnId,e){rangeState=null;clearRangeHighlight();dragData={type:'wn',wnId};e.dataTransfer.effectAllowed='copy';}
function onCellDragStart(pid,ds,e){e.stopPropagation();rangeState=null;clearRangeHighlight();dragData={type:'cell',pid,ds};e.dataTransfer.effectAllowed='move';}
function onDrop(pid,ds,e){
  e.preventDefault();e.stopPropagation();
  if(!dragData)return;
  const key=`${pid}_${ds}`;
  if(dragData.type==='wn'){
    S.asgn[key]=dragData.wnId;
  } else if(dragData.type==='cell'){
    const srcKey=`${dragData.pid}_${dragData.ds}`;
    const srcWid=S.asgn[srcKey];
    if(srcWid!==undefined){S.asgn[key]=srcWid;if(srcKey!==key)delete S.asgn[srcKey];}
  }
  dragData=null;onChange();render();
}

// ── Range selection ──────────────────────────────────────────
function cellMouseDown(pid,ds,event){
  if(event.button!==0)return;
  event.preventDefault();
  rangeState={pid,startDs:ds,endDs:ds,active:true};
  updateRangeHighlight();
}
function cellMouseEnter(pid,ds){
  if(!rangeState||!rangeState.active||pid!==rangeState.pid)return;
  rangeState.endDs=ds;
  updateRangeHighlight();
}
function updateRangeHighlight(){
  document.querySelectorAll('.dc.range-sel').forEach(el=>el.classList.remove('range-sel'));
  if(!rangeState||!rangeState.active)return;
  const d1=parseDs(rangeState.startDs),d2=parseDs(rangeState.endDs);
  const fromD=d1<=d2?d1:d2;const toD=d1<=d2?d2:d1;
  const pid=rangeState.pid;
  let cur=new Date(fromD);
  while(cur<=toD){
    const ds=fdDate(cur);
    const el=document.querySelector(`.dc[data-pid="${pid}"][data-ds="${ds}"]`);
    if(el)el.classList.add('range-sel');
    cur=addDays(cur,1);
  }
}
function clearRangeHighlight(){
  document.querySelectorAll('.dc.range-sel').forEach(el=>el.classList.remove('range-sel'));
}
function finishRange(){
  if(!rangeState||!rangeState.active)return;
  rangeState.active=false;
  clearRangeHighlight();
  const d1=parseDs(rangeState.startDs),d2=parseDs(rangeState.endDs);
  const fromD=d1<=d2?d1:d2;const toD=d1<=d2?d2:d1;
  if(rangeState.startDs===rangeState.endDs){
    S.modal={pid:rangeState.pid,ds:rangeState.startDs};
    rangeState=null;render();return;
  }
  S.rangeModal={pid:rangeState.pid,fromDs:fdDate(fromD),toDs:fdDate(toD)};
  rangeState=null;render();
}
function cancelRange(){S.rangeModal=null;rangeState=null;clearRangeHighlight();render();}

// ── Range assignment ─────────────────────────────────────────
function asgnWRange(wid){
  const rm=S.rangeModal;if(!rm)return;
  const p=gp(rm.pid);if(!p)return;
  const d1=parseDs(rm.fromDs),d2=parseDs(rm.toDs);
  let cur=new Date(d1);
  while(cur<=d2){
    const ds=fdDate(cur);
    if(pWorks(p,cur.getFullYear(),cur.getMonth(),cur.getDate())){
      const key=`${rm.pid}_${ds}`;
      if(wid===null){delete S.asgn[key];}else{S.asgn[key]=wid;}
    }
    cur=addDays(cur,1);
  }
  S.rangeModal=null;onChange();render();
}
function asgnRangeLeave(type){
  const rm=S.rangeModal;if(!rm)return;
  const p=gp(rm.pid);if(!p)return;
  if(!S.leave)S.leave={};
  const d1=parseDs(rm.fromDs),d2=parseDs(rm.toDs);
  let cur=new Date(d1);
  while(cur<=d2){
    const ds=fdDate(cur);
    if(pWorks(p,cur.getFullYear(),cur.getMonth(),cur.getDate())){
      S.leave[`${rm.pid}_${ds}`]=type;
    }
    cur=addDays(cur,1);
  }
  S.rangeModal=null;onChange();render();
}
function clearRangeLeave(){
  const rm=S.rangeModal;if(!rm)return;
  const p=gp(rm.pid);if(!p)return;
  if(!S.leave)S.leave={};
  const d1=parseDs(rm.fromDs),d2=parseDs(rm.toDs);
  let cur=new Date(d1);
  while(cur<=d2){
    const ds=fdDate(cur);
    delete S.leave[`${rm.pid}_${ds}`];
    cur=addDays(cur,1);
  }
  S.rangeModal=null;onChange();render();
}

// ── Single-day leave ─────────────────────────────────────────
function setLeave(pid,ds,type){
  if(!S.leave)S.leave={};
  S.leave[`${pid}_${ds}`]=type;
  S.modal=null;onChange();render();
}
function clearLeave(pid,ds){
  if(!S.leave)S.leave={};
  delete S.leave[`${pid}_${ds}`];
  S.modal=null;onChange();render();
}

// ── Range modal ───────────────────────────────────────────────
function bRangeModal(){
  const rm=S.rangeModal;const p=gp(rm.pid);
  const d1=parseDs(rm.fromDs),d2=parseDs(rm.toDs);
  const nDays=Math.round((d2-d1)/86400000)+1;
  return`<div class="ov" onclick="cancelRange()"><div class="modal" onclick="event.stopPropagation()">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:3px;">Meerdaags toewijzen</h3>
    <p style="font-size:12px;color:#64748b;margin-bottom:16px;">${esc(p?.name||'')} — ${rm.fromDs} t/m ${rm.toDs} <span style="background:#e0f2fe;color:#0369a1;border-radius:999px;padding:1px 8px;font-weight:600;">${nDays}d</span></p>
    <div style="display:flex;flex-direction:column;gap:7px;">
      <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:2px;">WERKNUMMER TOEWIJZEN</div>
      ${S.wns.map(w=>`<button class="wnbtn" onclick="asgnWRange(${w.id})" style="border:2px solid #e2e8f0;background:#fff;">${dot(w.color,13)}<div style="flex:1;"><div style="font-weight:600;font-size:13px;">${esc(w.label)}</div><div style="font-size:11px;color:#64748b;">${w.needed}u benodigd</div></div></button>`).join('')}
      ${!S.wns.length?'<p style="text-align:center;color:#94a3b8;font-size:12px;">Maak eerst werknummers aan in ⚙️ Instellingen.</p>':''}
      <div style="border-top:1px solid #e2e8f0;margin:4px 0;padding-top:10px;">
        <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:8px;">VERLOF / AFWEZIGHEID MARKEREN</div>
        <div style="display:flex;gap:7px;">
          <button onclick="asgnRangeLeave('V')" style="flex:1;padding:9px;border:2px solid #fcd34d;border-radius:10px;background:#fffbeb;color:#92400e;cursor:pointer;font-size:12px;font-weight:600;">🌴 Verlof</button>
          <button onclick="asgnRangeLeave('Z')" style="flex:1;padding:9px;border:2px solid #fca5a5;border-radius:10px;background:#fff1f2;color:#dc2626;cursor:pointer;font-size:12px;font-weight:600;">🤒 Ziek</button>
          <button onclick="clearRangeLeave()" style="flex:1;padding:9px;border:1px dashed #cbd5e1;border-radius:10px;background:#f8fafc;color:#64748b;cursor:pointer;font-size:11px;font-weight:500;">✕ Verlof wissen</button>
        </div>
      </div>
      <button onclick="asgnWRange(null)" style="padding:9px;border:1px dashed #fca5a5;border-radius:10px;background:#fff1f2;color:#dc2626;cursor:pointer;font-size:12px;font-weight:500;width:100%;">✕ Verwijder werknummers in bereik</button>
    </div>
    <button class="btn btn-s" onclick="cancelRange()" style="margin-top:12px;width:100%;">Annuleren</button>
  </div></div>`;
}

document.addEventListener('mouseup',finishRange);
loadSyncConfig();loadLocal();render();
if(SYNC.enabled){pullFromFirebase().then(changed=>{if(changed)render();startRealtimeSync();});}
